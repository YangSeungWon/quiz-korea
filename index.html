    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#3b82f6" />

    <!-- Open Graph (Facebook, Kakao, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="한국 지리 퀴즈" />
    <meta property="og:description" content="시도와 시군구를 지도에서 찾아보세요" />

    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="한국 지리 퀴즈" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="한국 지리 퀴즈" />
    <meta name="twitter:description" content="시도와 시군구를 지도에서 찾아보세요" />
    <meta name="twitter:image" content="https://quiz-korea.ysw.kr/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "한국 지리 퀴즈",
      "description": "한국의 시도와 시군구를 지도에서 찾아보는 지리 퀴즈 | Test your knowledge of South Korean geography",
      "url": "https://quiz-korea.ysw.kr",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "inLanguage": ["ko", "en"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "KRW"
      }
    }
    </script>

    <!-- Preload geographic data -->
    <link rel="preload" href="/data/korea-sido.json" as="fetch" crossorigin />

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
